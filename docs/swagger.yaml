openapi: 3.0.0
info:
  title: FixNearby API Documentation
  description: API endpoints specification for local service discovery, booking, and workers.
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful Authentication
  /api/workers/profile:
    get:
      summary: Get Worker Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successful profile retrieval
  /api/availability/status:
    put:
      summary: Update authenticated worker availability status
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - availabilityStatus
              properties:
                availabilityStatus:
                  type: string
                  enum:
                    - available
                    - busy
                    - offline
      responses:
        '200':
          description: Availability status updated successfully
        '400':
          description: Invalid availability status
        '401':
          description: Worker authentication is required
  /api/availability/status/{workerId}:
    get:
      summary: Get a worker's public availability status
      parameters:
        - name: workerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Worker availability status returned successfully
        '400':
          description: Invalid worker ID
        '404':
          description: Worker not found
  /api/issues/nearby:
    get:
      summary: Get Nearby Issues
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
        - name: longitude
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: List of nearby issues returned successfully
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
