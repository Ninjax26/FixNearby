name: Documentation Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/**'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for SECURITY.md
        run: |
          if [ ! -f "docs/SECURITY.md" ]; then
            echo "::warning::SECURITY.md is missing from docs/"
          else
            echo "✅ SECURITY.md exists"
          fi

      - name: Check for required documentation files
        run: |
          REQUIRED=("docs/ARCHITECTURE.md" "docs/CONTRIBUTING.md" "docs/CONTRIBUTOR_ROADMAP.md" "docs/DEVELOPER_GUIDE.md")
          for file in "${REQUIRED[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Required documentation file $file is missing"
              exit 1
            else
              echo "✅ $file exists"
            fi
          done

      - name: Check README has required sections
        run: |
          HAS_SETUP=$(grep -c "Getting Started" README.md || true)
          HAS_CONTRIB=$(grep -c "How to Contribute" README.md || true)
          HAS_LICENSE=$(grep -c "License" README.md || true)
          if [ "$HAS_SETUP" -eq 0 ]; then echo "::warning::README.md missing 'Getting Started' section"; fi
          if [ "$HAS_CONTRIB" -eq 0 ]; then echo "::warning::README.md missing 'Contributing' section"; fi
          if [ "$HAS_LICENSE" -eq 0 ]; then echo "::warning::README.md missing 'License' section"; fi
          echo "✅ README.md sections verified"

      - name: Check for broken internal links in markdown files
        run: |
          echo "::notice::Internal link checking would be performed here"
