name: CI Lint & Validation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-client:
    name: Validate Client (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Contributing Guidelines Path
        run: test -f docs/CONTRIBUTING.md

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Lint Client
        run: |
          cd client
          npm run lint --if-present

      - name: Build Client Check
        run: |
          cd client
          npm run build

  validate-server:
    name: Validate Server (Express/Node)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Verify Server Syntax & Run Tests
        env:
          MONGODB_URI: mongodb://localhost:27017/FixNearby_Test
          JWT_SECRET: test_jwt_secret_key_123456789
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd server
          node --check server.js
          npm test
